<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#6b7c6e"/>
  <g transform="translate(256,256) scale(0.7)" fill="#f7f6f3">
    <!-- Simplified starling bird silhouette -->
    <ellipse cx="-20" cy="20" rx="90" ry="60" transform="rotate(-15)"/>
    <!-- head -->
    <circle cx="-90" cy="-30" r="35"/>
    <!-- beak -->
    <polygon points="-120,-40 -155,-35 -120,-28"/>
    <!-- tail -->
    <polygon points="70,30 140,60 130,80 60,50"/>
    <!-- wing detail -->
    <ellipse cx="0" cy="10" rx="70" ry="35" transform="rotate(-20)" fill="#5a6b5d"/>
    <!-- eye -->
    <circle cx="-100" cy="-35" r="5" fill="#6b7c6e"/>
  </g>
</svg>
